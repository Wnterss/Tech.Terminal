<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCYNE // CORE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;700&display=swap');

        body {
            background-color: #020406;
            background-image: 
                linear-gradient(rgba(0, 150, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 150, 255, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #7a8b99;
            font-family: 'Fira Code', monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #monitor {
            width: 90%;
            max-width: 900px;
            height: 80vh;
            background: rgba(2, 5, 8, 0.9);
            border: 1px solid #102a3a;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.8);
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        #monitor::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.15), rgba(0,0,0,0.15) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
        }

        #terminal-container {
            flex-grow: 1;
            overflow-y: auto;
            z-index: 2;
            padding-right: 10px;
        }

        .line { margin: 4px 0; line-height: 1.4; word-wrap: break-word; }
        
        .sys { color: #526270; }
        .err { color: #cc3333; }
        .succ { color: #33cc66; }
        .file { color: #cccc33; }
        .cmd-echo { color: #ffffff; }
        
        /* Улучшенный эффект сломанного текста (RGB-сдвиг) */
        .glitch {
            display: inline-block;
            color: #cc3333;
            animation: crt-glitch 3s infinite;
        }

        @keyframes crt-glitch {
            0%, 94%, 100% {
                transform: translate(0, 0) skewX(0deg);
                text-shadow: none;
            }
            95% {
                transform: translate(-2px, 1px) skewX(10deg);
                text-shadow: 2px 0px #00ffff, -2px 0px #ff00ff;
                opacity: 0.8;
            }
            96% {
                transform: translate(2px, -1px) skewX(-10deg);
                text-shadow: -2px 0px #00ffff, 2px 0px #ff00ff;
                opacity: 0.9;
            }
            97% {
                transform: translate(0, 0) skewX(0deg);
                text-shadow: none;
                opacity: 1;
            }
        }
        @keyframes glitch-anim {
            0% { clip-path: inset(10% 0 30% 0); transform: translate(-2px, 2px); }
            20% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -2px); }
            40% { clip-path: inset(40% 0 20% 0); transform: translate(-2px, 0); }
            60% { clip-path: inset(90% 0 10% 0); transform: translate(2px, 2px); }
            80% { clip-path: inset(20% 0 50% 0); transform: translate(-2px, -2px); }
            100% { clip-path: inset(50% 0 30% 0); transform: translate(0, 0); }
        }

        .input-wrapper {
            display: flex;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px dashed #102a3a;
            z-index: 2;
        }

        .prompt { color: #7a8b99; font-weight: bold; margin-right: 10px; }
        
        input {
            background: transparent;
            border: none;
            color: #ffffff;
            font-family: 'Fira Code', monospace;
            font-size: 16px;
            width: 100%;
            outline: none;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #102a3a; }
        
        /* Мигающий курсор при печати */
        .typing::after {
            content: '█';
            animation: blink 1s step-end infinite;
            color: #7a8b99;
        }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <!-- 
      ERR 0x00000000
      [КРИТИЧЕСКИЙ СБОЙ ПАМЯТИ]
      Секторы администратора заблокированы.
      ROOT_PASSWORD = КОВЧЕГ
    -->

    <div id="monitor">
        <div id="terminal-container"></div>
        <div class="input-wrapper">
            <span class="prompt" id="prompt">GUEST@ARCYNE:~$</span>
            <input type="text" id="cmd" autocomplete="off" autofocus>
        </div>
    </div>

    <script>
        const input = document.getElementById('cmd');
        const container = document.getElementById('terminal-container');
        const promptEl = document.getElementById('prompt');
        
        let isAuth = false;
        let isTyping = false;

        // Инициализация аудиофайла (файл должен называться record_audio.wav и лежать в той же папке)
        const morseAudio = new Audio('record_audio.wav');
        morseAudio.volume = 0.8;

        const files = {
            "diagnostic.log": "ERR_TEMP_HIGH: +490°C. \nСбой логики сектора 4. Блок 0. Узел 2.",
            "record_audio_?.wav": "[АУДИО СИГНАЛ. Введите play record_audio_?.wav]",
            "ruins_map.enc": "[ФАЙЛ ЗАШИФРОВАН. Введите decode ruins_map.enc <pin>]"
        };

        // Стартовая загрузка
        window.onload = async () => {
            input.disabled = true;
            await typeText("<span class='glitch'>СИСТЕМНЫЙ СБОЙ</span>", "err", 50);
            await typeText("ARCYNE CORE v.0.1a ... ЗАГРУЗКА", "sys", 30);
            await typeText("СВЯЗЬ... [OFFLINE]", "sys", 30);
            await typeText("Введите 'help' для списка команд.", "sys", 30);
            input.disabled = false;
            input.focus();
        };

        // Функция печатания текста (типография)
        async function typeText(html, type = '', speed = 15) {
            return new Promise(resolve => {
                const div = document.createElement('div');
                div.className = `line ${type} typing`;
                container.appendChild(div);
                
                let i = 0;
                let currentHTML = "";
                let inTag = false;
                let tagContent = "";

                function typeChar() {
                    if (i < html.length) {
                        let char = html.charAt(i);
                        if (char === '<') inTag = true;
                        
                        if (inTag) {
                            tagContent += char;
                            if (char === '>') {
                                inTag = false;
                                currentHTML += tagContent;
                                tagContent = "";
                            }
                        } else {
                            currentHTML += char;
                        }
                        
                        div.innerHTML = currentHTML;
                        container.scrollTop = container.scrollHeight;
                        i++;
                        
                        // Немного рваная скорость печати для реализма
                        let currentSpeed = inTag ? 0 : speed + (Math.random() * 20 - 10);
                        setTimeout(typeChar, currentSpeed);
                    } else {
                        div.classList.remove('typing');
                        resolve();
                    }
                }
                typeChar();
            });
        }

        // Обработка ввода
        input.addEventListener('keydown', async function(e) {
            if (e.key === 'Enter' && !isTyping) {
                const rawVal = input.value.trim();
                const val = rawVal.toLowerCase();
                
                if (val !== '') {
                    isTyping = true;
                    input.disabled = true;
                    
                    // Выводим команду игрока моментально
                    const userDiv = document.createElement('div');
                    userDiv.className = 'line';
                    userDiv.innerHTML = `<span class="prompt">${promptEl.innerText}</span> <span class="cmd-echo">${rawVal}</span>`;
                    container.appendChild(userDiv);
                    
                    input.value = '';
                    await processCommand(val);
                    
                    input.disabled = false;
                    input.focus();
                    isTyping = false;
                }
            }
        });

        async function processCommand(cmd) {
            const args = cmd.split(' ');
            const main = args[0];

            switch(main) {
                case 'help':
                    await typeText("ls - файлы", "sys", 10);
                    await typeText("read <файл> - чтение", "sys", 10);
                    await typeText("play <файл> - аудио", "sys", 10);
                    await typeText("decode <файл> <pin> - дешифровка", "sys", 10);
                    await typeText("auth <ключ> - рут-доступ", "sys", 10);
                    break;
                case 'ls':
                    for (let f of Object.keys(files)) {
                        await typeText(f, "file", 10);
                    }
                    break;
                case 'read':
                    if (args.length < 2) {
                        await typeText("ERR: Нет аргумента.", "err");
                        return;
                    }
                    if (args[1] === 'record_audio_?.wav') {
                        await typeText("ERR: Бинарный файл. Используйте команду play.", "err");
                    } else if (files[args[1]]) {
                        await typeText(files[args[1]], "", 15);
                    } else {
                        await typeText("404: Файл не найден.", "err");
                    }
                    break;
                case 'play':
                    if (args.length < 2) {
                        await typeText("ERR: Нет аргумента.", "err");
                        return;
                    }
                    if (args[1] === 'record_audio_?.wav') {
                        await typeText("ИНИЦИАЛИЗАЦИЯ АУДИОДРАЙВЕРА...", "sys");
                        await typeText("ВОСПРОИЗВЕДЕНИЕ...", "succ");
                        
                        // Запускаем звук
                        morseAudio.currentTime = 0;
                        morseAudio.play().catch(() => {
                            typeText("ERR: Браузер заблокировал звук. Кликните по экрану.", "err");
                        });
                    } else {
                        await typeText("404: Файл не найден.", "err");
                    }
                    break;
                case 'auth':
                    if (args.length < 2) return await typeText("ERR: Пустой ключ.", "err");
                    if (args[1] === 'ковчег') {
                        isAuth = true;
                        promptEl.innerText = "ROOT@ARCYNE:#";
                        promptEl.style.color = "#cc3333";
                        await typeText("ROOT ДОСТУП РАЗРЕШЕН.", "succ");
                    } else {
                        await typeText("ERR: ОТКАЗ. <span class='glitch'>СБОЙ СБОЙ СБОЙ</span>", "err");
                    }
                    break;
                case 'decode':
                    if (args.length < 3) return await typeText("ERR: Формат -> decode <файл> <pin>", "err");
                    
                    if (args[1] === 'ruins_map.enc') {
                        if (!isAuth) {
                            await typeText("ERR: ТРЕБУЮТСЯ ПРАВА ROOT.", "err");
                            return;
                        }
                        if (args[2] === '402') {
                            await typeText("ДЕШИФРОВКА...", "sys", 40);
                            await typeText("УСПЕШНО. КАРТА ВОССТАНОВЛЕНА.", "succ");
                            await typeText("Координаты фрагментов: Ищите под старым спавном. Знак Предтеч укажет путь.", "file", 25);
                        } else {
                            await typeText("ERR: НЕВЕРНЫЙ PIN.", "err");
                        }
                    } else {
                        await typeText("ERR: Файл не подлежит дешифровке.", "err");
                    }
                    break;
                default:
                    await typeText(`Команда не найдена.`, "err");
            }
        }
    </script>
</body>
</html>
